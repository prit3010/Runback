[project]
name = "runback-cli"
version = "0.0.0"
description = "Runback CLI and runner daemon"
requires-python = ">=3.11"
dependencies = [
  "click>=8.1",
  "httpx>=0.27",
  "rich>=13.9",
  "ulid-py>=1.1",
  "anyio>=4.6",
  "watchfiles>=0.24",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "pytest-asyncio>=0.24",
  "pytest-httpx>=0.35",
  "ruff>=0.7",
]

[project.scripts]
runback = "runback.__main__:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["runback"]

[tool.hatch.build.targets.wheel.force-include]
"runback/hooks/settings_template.json" = "runback/hooks/settings_template.json"
"runback/hooks/forward-hook.sh" = "runback/hooks/forward-hook.sh"

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
  "slow: real claude required",
]
