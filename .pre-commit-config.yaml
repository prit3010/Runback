repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2000]
  - repo: local
    hooks:
      - id: openapi-validate
        name: validate docs/contracts/openapi.yaml
        entry: python -c "import sys, yaml; from openapi_spec_validator import validate; [validate(yaml.safe_load(open(p))) for p in sys.argv[1:]]"
        language: system
        files: ^docs/contracts/openapi\.yaml$
